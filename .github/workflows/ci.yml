name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff (warnings only)
        run: ruff check . || true

      - name: Run tests
        env:
          OPENAI_API_KEY: test-key-not-used-in-unit-tests
        run: pytest tests/ -v --tb=short

      - name: Quality gate (eval pass rate >= 80%)
        env:
          OPENAI_API_KEY: test-key-not-used-in-unit-tests
        run: pytest tests/test_extractor.py::TestEvalDataset -v
